name: Self-Heal Pipeline

on:
  schedule:
    - cron: "0 2 * * *" # AUTO-UPDATED: Synced with self-heal-schedule.yml
  workflow_dispatch:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    # Only run on CI failure or schedule/dispatch
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Pre-healthcheck
        id: pre_healthcheck
        run: |
          if scripts/healthcheck.sh; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Upload pre-healthcheck logs
        if: steps.pre_healthcheck.outputs.status == 'fail'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pre-healthcheck-logs
          path: .lint-reports/

      - name: Run self-heal pipeline
        id: repair
        run: scripts/self_heal.py

      - name: Check for meaningful diff
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for duplicate open PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search for open PRs with the label 'self-heal'
          COUNT=$(gh pr list --label "self-heal" --state open --json number --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        if: >
          steps.diff.outputs.has_diff == 'true' &&
          steps.check_pr.outputs.duplicate == 'false' &&
          !startsWith(github.ref, 'refs/heads/selfheal-')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: apply self-heal fixes"
          branch: selfheal-repair
          delete-branch: true
          title: "Self-Heal automated fixes"
          body: |
            This PR contains automated fixes generated by the Self-Heal Agent.
            Trigger: ${{ github.event_name }}.
            Drift summary: changes applied to allowed paths.
            Link to context: see Claude chat.
          labels: |
            automation
            self-heal
