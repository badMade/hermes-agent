name: Self-Heal Pipeline

on:
  schedule:
    # Trigger based on the generated cron expression. Gated to default branch.
    - cron: "0 1 * * 2,4"
  workflow_dispatch:
  workflow_run:
    workflows: ["Tests", "Lint (ruff + ty)", "osv-scanner"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: selfheal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-heal:
    # Trigger conditions:
    # 1. Scheduled / manual dispatch OR
    # 2. Workflow run completed and failed
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine Trigger Reason
        id: trigger
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "title=[Self-Heal Scheduled] Drift fixes" >> $GITHUB_OUTPUT
            echo "reason=scheduled" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "title=[Self-Heal Manual] Repair" >> $GITHUB_OUTPUT
            echo "reason=manual_dispatch" >> $GITHUB_OUTPUT
          else
            echo "title=[Self-Heal Reactive] CI fix" >> $GITHUB_OUTPUT
            echo "reason=ci_failure" >> $GITHUB_OUTPUT
          fi

      - name: Guard - Duplicate PR Check
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close stale selfheal PRs (older than 7 days)
          gh pr list --label "self-heal" --state open --json number,createdAt --jq '.[] | select(.createdAt < (now - 604800 | todate)) | .number' | xargs -I {} gh pr close {} --comment "Closing stale self-heal PR" || true

          # Check for recent open PRs
          OPEN_PR=$(gh pr list --label "self-heal" --state open --limit 1 --json number --jq '.[].number')
          if [ -n "$OPEN_PR" ]; then
            echo "Open selfheal PR #$OPEN_PR exists. Skipping to avoid duplicates."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Pre-Healthcheck
        if: steps.pr_check.outputs.skip == 'false'
        id: pre_check
        run: |
          if scripts/healthcheck.sh; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Self-Heal Pipeline
        if: steps.pr_check.outputs.skip == 'false'
        id: heal
        run: |
          # Run the idempotent repair script
          if scripts/self_heal.py; then
             echo "fixed=true" >> $GITHUB_OUTPUT
          else
             echo "fixed=false" >> $GITHUB_OUTPUT
             exit 1  # Fail fast if no fix
          fi

      - name: Post-Healthcheck
        if: steps.pr_check.outputs.skip == 'false' && steps.heal.outputs.fixed == 'true'
        run: scripts/healthcheck.sh

      - name: Verify Allowed Paths (Diff Guard)
        if: steps.pr_check.outputs.skip == 'false' && steps.heal.outputs.fixed == 'true'
        run: |
          # Block forbidden paths (workflows, secrets, env)
          git diff --name-only | grep -E '(\.github/workflows/main|.*\.env.*|.*secret.*)' && { echo "Forbidden path modified!"; exit 1; } || true

      - name: Create Pull Request
        if: steps.pr_check.outputs.skip == 'false' && steps.heal.outputs.fixed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="selfheal-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add -u
          git commit -m "${{ steps.trigger.outputs.title }}"
          git push origin "$BRANCH_NAME"

          PR_BODY="### Self-Heal Repair

          Trigger: ${{ steps.trigger.outputs.reason }}

          This PR was automatically generated by the self-heal pipeline to fix drift or CI failures.

          **Artifacts and Logs**: Check the workflow run for pre/post healthcheck logs.

          > [!NOTE]
          > Link back to Claude/Claude Code chat context for review.

          ### Reviewer Checklist
          - [ ] Verify diff contains only expected repairs
          - [ ] No secrets or unauthorized dependencies added
          - [ ] Tests and builds pass
          "

          gh pr create \
            --title "${{ steps.trigger.outputs.title }}" \
            --body "$PR_BODY" \
            --label "automation,self-heal" \
            --base main \
            --head "$BRANCH_NAME"