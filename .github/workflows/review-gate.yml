name: Review gate

# Required status check for auto-merge.
# Passes only when:
#   1. All review threads are resolved (or outdated), AND
#   2. The `reviewed` label is present on the PR.
#
# Add "Review gate / review-gate" as a required status check in
# Settings → Branches → branch protection rules so auto-merge
# waits for this to go green before merging.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed, edited]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: review-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check reviewed label and resolved threads
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9
        with:
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.warning('No pull_request in payload — skipping');
              return;
            }
            const { owner, repo } = context.repo;

            // 1. Check for the 'reviewed' label.
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            const hasLabel = pr.labels.some(l => l.name === 'reviewed');

            // 2. Count unresolved review threads via GraphQL.
            //    The REST API doesn't expose isResolved; GraphQL does.
            //    Paginate in case there are more than 100 threads.
            let cursor = null;
            let unresolved = 0;
            do {
              const resp = await github.graphql(`
                query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pr) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes { isResolved isOutdated }
                      }
                    }
                  }
                }
              `, { owner, repo, pr: prNumber, cursor });

              const threads = resp.repository.pullRequest.reviewThreads;
              unresolved += threads.nodes.filter(t => !t.isResolved && !t.isOutdated).length;
              cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
            } while (cursor);

            // 3. Report.
            const problems = [];
            if (!hasLabel)  problems.push('`reviewed` label not set');
            if (unresolved) problems.push(`${unresolved} unresolved thread(s)`);

            if (problems.length) {
              core.setFailed(problems.join(' · '));
            } else {
              core.info('✓ reviewed label present and all threads resolved');
            }
