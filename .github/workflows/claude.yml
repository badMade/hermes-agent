name: Claude Code

# Responds to @claude mentions on issues and pull requests. Comment
# "@claude review this PR" (or anything else) and Claude runs with the
# surrounding issue/PR context. Requires an ANTHROPIC_API_KEY repo secret.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

# Only spend a run when @claude is actually mentioned.
permissions:
  contents: read

jobs:
  claude:
    name: Claude Code
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # let Claude push fixes when asked
      pull-requests: write # post reviews / comments
      issues: write # comment on issues
      id-token: write # OIDC for the action
      actions: read # read CI results when reviewing
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
