name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly on Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  compute-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: |
          pip install ruamel.yaml requests

      - name: Compute and Update Schedule
        run: |
          python scripts/compute_schedule.py

      - name: Check for Changes
        id: check_changes
        run: |
          diff=$(git status --porcelain)
          if [ -n "$diff" ]; then
             echo "has_changes=true" >> $GITHUB_OUTPUT
          else
             echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # Check for duplicate PRs
          open_prs=$(gh pr list --label "self-heal" --state open --search "in:title Update cadence" --json number -q '.[].number')
          if [ -n "$open_prs" ]; then
             echo "An open schedule update PR already exists ($open_prs). Skipping."
             exit 0
          fi

          BRANCH_NAME="selfheal-schedule-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/self-heal-schedule.yml .github/workflows/self-heal.yml
          git commit -m "[Self-Heal Schedule] Update cadence"
          git push origin "$BRANCH_NAME"

          # Create PR via gh CLI
          cat << 'EOF' > pr_body.txt
          This PR was automatically generated by the Self-Heal Coding Agent.

          **Trigger:** ${{ github.event_name }}

          The compute-schedule workflow has calculated a new optimal schedule based on recent repository telemetry.

          *Refer to the Self-Heal CLI context chat for more details.*
          EOF

          gh pr create --title "[Self-Heal Schedule] Update cadence" --body-file pr_body.txt --label "automation,self-heal" --base main --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
