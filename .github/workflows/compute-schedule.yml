name: Compute Self-Heal Schedule

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compute-schedule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Compute new schedule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/compute_schedule.py

      - name: Check for meaningful diff
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for duplicate open PRs
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --label "self-heal" --state open --json number --jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        if: >
          steps.diff.outputs.has_diff == 'true' &&
          steps.check_pr.outputs.duplicate == 'false'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update self-heal schedule"
          branch: self-heal-schedule
          delete-branch: true
          title: "[Self-Heal Schedule] Update cadence"
          body: |
            This PR updates the Self-Heal schedule based on recent project telemetry.
            Link to context: see Claude chat.
          labels: |
            automation
            self-heal
