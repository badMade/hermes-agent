name: Auto-merge

on:
  # synchronize/opened/reopened make Auto-merge VISIBLE in the PR's check
  # list as a quick passing status. The script posts a pending status and
  # returns immediately on these events — it does NOT poll. The real
  # evaluation runs on workflow_run / pull_request_review / labeled events.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  # CI-completion triggers: fire once per workflow finish so we get a
  # fresh evaluation the moment the last check goes green.
  # Note: workflow_run only reads from the default branch, so these
  # triggers are active for future PRs once this workflow is on main.
  workflow_run:
    workflows:
      - "Tests"
      - "Lint (ruff + ty)"
      - "Nix"
      - "Contributor Attribution Check"
      - "Supply Chain Audit"
      - "OSV-Scanner"
      - "Docs Site Checks"
      - "uv.lock check"
      - "Docker Build and Publish"
    types: [completed]

# One evaluation per PR at a time; cancel any in-flight run when a
# newer trigger arrives for the same PR.
# Fast-path events (synchronize/opened/reopened) only post a pending status
# and return immediately, so they use a separate concurrency group suffix
# ('-fast') to avoid cancelling ongoing evaluation runs triggered by
# pull_request_review, workflow_run, or labeled events.
concurrency:
  group: >-
    auto-merge-pr-${{
      (github.event_name == 'workflow_run' &&
        (github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id)) ||
      github.event.pull_request.number ||
      github.event.issue.number ||
      github.run_id
    }}-${{
      (github.event_name == 'pull_request' &&
       (github.event.action == 'synchronize' ||
        github.event.action == 'opened' ||
        github.event.action == 'reopened')) && 'fast' || 'eval'
    }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write
  checks: read
  statuses: write
  issues: read

jobs:
  auto-merge:
    name: Auto-merge on review + passing checks
    runs-on: ubuntu-latest
    # Skip fork PRs; skip non-'reviewed' label events; prevent self-trigger loop.
    # synchronize/opened/reopened are allowed through so the workflow appears
    # in the PR's checks list; the script short-circuits on those events.
    # issue_comment fires for all issues — gate to PRs only.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.name != 'Auto-merge' && github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (github.event.action != 'labeled' || github.event.label.name == 'reviewed')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    # No polling needed for workflow_run — it fires after CI finishes.
    # For pull_request_review / labeled / issue_comment events a short poll loop waits for CI.
    timeout-minutes: 30

    steps:
      - name: Evaluate checks, reviews, and merge
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9
        env:
          CURRENT_RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const currentRunId = process.env.CURRENT_RUN_ID;
            const workflowRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Known review-bot logins. A comment (or review of any state) from
            // any of these counts as review activity, even if the bot couldn't
            // produce a real review (e.g. "daily quota exceeded" responses,
            // Copilot-over-usage-limit notices). The attempted review counts.
            const REVIEW_BOTS = new Set([
              'gemini-code-assist[bot]',
              'gemini-code-assist',
              'copilot-pull-request-reviewer[bot]',
              'copilot-pull-request-reviewer',
              'copilot-swe-agent[bot]',
              'copilot-swe-agent',
              'github-copilot[bot]',
              'github-copilot',
              'Copilot',
              'copilot[bot]',
              'copilot',
              'coderabbitai[bot]',
              'coderabbitai',
              'qodo-merge-pro[bot]',
              'qodo-merge-pro',
              'codium-ai[bot]',
              'codium-ai',
            ]);

            // ── Helper: post / update the visible `auto-merge` commit status ───
            // This is the user-visible PENDING indicator that stays in the PR's
            // checks list until evaluation reaches a terminal state. The status
            // `context` value is stable so subsequent posts to the same SHA
            // update the existing entry in-place.
            const STATUS_CONTEXT = 'auto-merge';
            async function setStatus(sha, state, description) {
              try {
                await github.rest.repos.createCommitStatus({
                  owner, repo, sha,
                  state,                  // pending | success | failure | error
                  context: STATUS_CONTEXT,
                  description: description.slice(0, 140),
                  target_url: workflowRunUrl,
                });
              } catch (err) {
                core.warning(`Failed to set commit status (${state}): ${err.message}`);
              }
            }

            // ── Status-only fast path for push/open/reopen ─────────────────────
            // On synchronize/opened/reopened: post a pending status so the PR's
            // check list shows something, then RETURN immediately. The real
            // evaluation will fire on workflow_run events as CI completes, and
            // on pull_request_review / labeled events. Returning here avoids
            // sitting in a long poll loop that the concurrency group cancels
            // every time another trigger arrives.
            if (context.eventName === 'pull_request') {
              const action = context.payload.action;
              if (action === 'synchronize' || action === 'opened' || action === 'reopened') {
                const sha = context.payload.pull_request.head.sha;
                await setStatus(sha, 'pending',
                  'Waiting for CI to finish and a qualifying review.');
                core.info(
                  `Event '${action}' for ${sha.slice(0,7)} — status posted; ` +
                  `workflow_run events will trigger the real evaluation.`
                );
                return;
              }
            }

            // ── Resolve PR number from event context ───────────────────────────
            // workflow_run doesn't have pull_request in the payload; find it
            // from the head SHA's associated open PRs instead.
            let prNumber;
            if (context.eventName === 'workflow_run') {
              const wr = context.payload.workflow_run;
              if (wr.pull_requests && wr.pull_requests.length > 0) {
                prNumber = wr.pull_requests[0].number;
              } else {
                // Fork PRs or branches with no open PR — nothing to do.
                core.info('workflow_run has no associated same-repo PR — skipping.');
                return;
              }
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
            } else {
              prNumber = context.payload.pull_request.number;
            }

            // ── Helper: post or update a marker comment ────────────────────────
            async function upsertComment(marker, body) {
              const fullBody = `${marker}\n${body}`;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber, body: fullBody,
                });
              }
            }

            // ── 1. Verify PR is still open ─────────────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            // workflow_run and issue_comment events can resolve to fork PRs;
            // event-level guards for these triggers don't carry full PR head metadata.
            if ((context.eventName === 'workflow_run' || context.eventName === 'issue_comment')
                && pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.info(`PR #${prNumber} is from fork '${pr.head.repo.full_name}' — skipping.`);
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is ${pr.state} — nothing to do.`);
              return;
            }

            const headSha = pr.head.sha;

            // Brief settle delay for human-action triggers (labeled, review
            // submitted) so GitHub has time to record the latest state.
            // workflow_run triggers already arrive after the check completed,
            // so no wait is needed.
            if (context.eventName !== 'workflow_run') {
              await new Promise(r => setTimeout(r, 10_000));
            }

            // ── 2. Fetch external check runs (helper used by poll loop) ───────
            // Exclude the current run by its ID, and also exclude all runs of
            // the auto-merge job itself — prior invocations may be present with
            // conclusion 'cancelled' (due to cancel-in-progress) and must not
            // be treated as failing CI checks.
            const AUTO_MERGE_JOB_NAME = 'Auto-merge on review + passing checks';
            async function fetchExternalRuns() {
              const { data: sd } = await github.rest.checks.listSuitesForRef({
                owner, repo, ref: headSha, per_page: 100,
              });
              let all = [];
              for (const suite of sd.check_suites) {
                const { data: rd } = await github.rest.checks.listForSuite({
                  owner, repo, check_suite_id: suite.id, per_page: 100,
                });
                all = all.concat(rd.check_runs);
              }
              return all.filter(run => {
                const url = run.details_url || run.html_url || '';
                return !url.includes(`/runs/${currentRunId}`)
                  && run.name !== AUTO_MERGE_JOB_NAME;
              });
            }

            let externalRuns = await fetchExternalRuns();
            core.info(`External check runs for ${headSha.slice(0,7)}: ${externalRuns.length}`);
            for (const r of externalRuns) core.info(`  ${r.name}: ${r.status} / ${r.conclusion}`);

            // ── 3. Guard: no CI found ──────────────────────────────────────────
            if (externalRuns.length === 0) {
              core.warning('No external CI check runs found.');
              await setStatus(headSha, 'pending', 'No CI checks detected yet.');
              await upsertComment(
                '<!-- auto-merge-no-ci -->',
                `### Auto-merge: no CI detected\n\n` +
                `No CI check runs were found for commit \`${headSha.slice(0,7)}\`.\n` +
                `Auto-merge will not proceed until CI is configured and running.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 4. Wait for all checks to complete ────────────────────────────
            // workflow_run: another suite may still be running — exit and let the
            // next workflow_run completion re-evaluate.
            // pull_request_review / labeled / issue_comment: poll up to 25 min.
            let pendingRuns = externalRuns.filter(r => r.status !== 'completed');
            if (pendingRuns.length > 0) {
              if (context.eventName === 'workflow_run') {
                core.info(`${pendingRuns.length} check(s) still pending — exiting; next workflow_run will re-evaluate.`);
                return;
              }
              const POLL_INTERVAL_MS = 60_000;   // 1 minute
              const POLL_TIMEOUT_MS  = 25 * 60_000; // 25 minutes
              const pollStart = Date.now();
              while (pendingRuns.length > 0) {
                if (Date.now() - pollStart >= POLL_TIMEOUT_MS) {
                  core.warning('Poll timeout — CI did not complete within 25 min.');
                  await setStatus(headSha, 'error',
                    'CI did not complete within 25 minutes.');
                  return;
                }
                const elapsedMin = Math.floor((Date.now() - pollStart) / 60_000);
                core.info(`${pendingRuns.length} check(s) still pending (${elapsedMin}m elapsed)…`);
                await setStatus(headSha, 'pending',
                  `Waiting on ${pendingRuns.length} CI check(s) (${elapsedMin}m).`);
                await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
                externalRuns = await fetchExternalRuns();
                pendingRuns  = externalRuns.filter(r => r.status !== 'completed');
              }
              core.info('All CI checks have now completed.');
            }

            // ── 5. Guard: failing checks ───────────────────────────────────────
            const acceptable = new Set(['success', 'skipped', 'neutral']);
            const failing = externalRuns.filter(r => !acceptable.has(r.conclusion));
            if (failing.length > 0) {
              core.warning(`${failing.length} check(s) failing.`);
              await setStatus(headSha, 'failure',
                `${failing.length} CI check(s) failing.`);
              await upsertComment(
                '<!-- auto-merge-fail -->',
                `### Auto-merge: checks failing\n\n` +
                `The following checks did not pass:\n` +
                failing.map(r => `- \`${r.name}\` (${r.conclusion})`).join('\n') + '\n\n' +
                `Please fix the failing checks before this PR can be merged.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }
            core.info('All CI checks passed/skipped/neutral.');

            // ── 6. Re-fetch PR to get latest labels and verify SHA is unchanged ─
            const { data: freshPr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            if (freshPr.state !== 'open') {
              core.info(`PR #${prNumber} is now ${freshPr.state} — skipping.`);
              return;
            }
            if (freshPr.head.sha !== headSha) {
              core.info(
                `Head SHA changed (${headSha.slice(0,7)} → ${freshPr.head.sha.slice(0,7)}) — ` +
                `aborting to avoid merging unreviewed code.`
              );
              return;
            }

            // ── 7. Collect reviews ─────────────────────────────────────────────
            const allReviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: prNumber,
            });
            const latestByReviewer = {};
            for (const review of allReviews) {
              latestByReviewer[review.user.login] = review;
            }
            const reviewList       = Object.values(latestByReviewer);
            const changesRequested = reviewList.filter(r => r.state === 'CHANGES_REQUESTED');
            const approvedReviews  = reviewList.filter(r => r.state === 'APPROVED');
            const approvedNames    = approvedReviews.map(r => r.user.login);
            const reviewerStats    = approvedReviews.length > 0
              ? `${approvedReviews.length} approved review(s): ${approvedNames.join(', ')}`
              : 'no approvals yet';

            // ── 8. Guard: CHANGES_REQUESTED blocks merge ───────────────────────
            if (changesRequested.length > 0) {
              const blockers = changesRequested.map(r => r.user.login).join(', ');
              core.warning(`Changes requested by: ${blockers}`);
              await setStatus(headSha, 'failure',
                `Changes requested by ${blockers}.`);
              await upsertComment(
                '<!-- auto-merge-changes-requested -->',
                `### Auto-merge: changes requested\n\n` +
                `The following reviewer(s) have requested changes: **${blockers}**.\n\n` +
                `Auto-merge is blocked until all change requests are resolved or dismissed.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 9. Collect review comments and bot activity ────────────────────
            // Three independent signals satisfy "review activity":
            //   a) any APPROVED review,
            //   b) at least one inline review comment from a non-author,
            //   c) any comment OR review from a known code-review bot — even
            //      if the bot responded with a quota / rate-limit error, the
            //      attempted review counts.
            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number: prNumber,
            });
            const nonAuthorComments = reviewComments.filter(c => c.user.login !== freshPr.user.login);

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber,
            });
            const botIssueComments = issueComments.filter(c => REVIEW_BOTS.has(c.user.login));
            const botReviews       = reviewList.filter(r => REVIEW_BOTS.has(r.user.login));
            const reviewBotActivity = botIssueComments.length + botReviews.length;
            const botNames = Array.from(new Set([
              ...botIssueComments.map(c => c.user.login),
              ...botReviews.map(r => r.user.login),
            ]));

            const reviewDetected = approvedReviews.length > 0
              || nonAuthorComments.length > 0
              || reviewBotActivity > 0;
            const hasReviewedLabel = freshPr.labels.some(l => l.name === 'reviewed');

            core.info(`Review detected: ${reviewDetected} (${reviewerStats}; ` +
              `bot activity: ${reviewBotActivity}${botNames.length ? ` from ${botNames.join(', ')}` : ''})`);
            core.info(`'reviewed' label: ${hasReviewedLabel}`);

            // ── 9b. Bot-implied approval (resolved threads = APPROVAL) ────────
            // A known review bot with activity on this PR counts as an APPROVED
            // review when none of its inline review threads remain unresolved.
            // Resolving a bot's threads is itself an explicit human sign-off,
            // so this implied approval also satisfies the `reviewed` label gate.
            //   - Bot left inline threads, all resolved → implied approval.
            //   - Bot left only summary comments / a review with no threads →
            //     nothing to resolve, counts as implied approval.
            //   - Bot has any unresolved thread → NOT an implied approval; the
            //     label gate still applies until threads are addressed.
            //   - Bot whose latest review is CHANGES_REQUESTED → handled by
            //     step 8 above; never an implied approval.
            const reviewThreads = [];
            try {
              const threadQuery = `
                query($owner: String!, $name: String!, $number: Int!, $cursor: String) {
                  repository(owner: $owner, name: $name) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          isResolved
                          comments(first: 100) {
                            nodes { author { login } }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              let threadCursor = null;
              while (true) {
                const result = await github.graphql(threadQuery, {
                  owner, name: repo, number: prNumber, cursor: threadCursor,
                });
                const rt = result.repository.pullRequest.reviewThreads;
                reviewThreads.push(...rt.nodes);
                if (!rt.pageInfo.hasNextPage) break;
                threadCursor = rt.pageInfo.endCursor;
              }
            } catch (err) {
              // GraphQL outages should not block merge — fall back to "no
              // resolution info" which leaves the label gate active.
              core.warning(`Failed to fetch review threads via GraphQL: ${err.message}`);
            }

            const botsWithActivity = new Set([
              ...botIssueComments.map(c => c.user.login),
              ...botReviews.map(r => r.user.login),
            ]);
            const botsRequestingChanges = new Set(
              changesRequested
                .filter(r => REVIEW_BOTS.has(r.user.login))
                .map(r => r.user.login)
            );
            const botThreadStats = {};
            for (const thread of reviewThreads) {
              const authorsInThread = new Set(
                thread.comments.nodes
                  .map(c => c.author && c.author.login)
                  .filter(Boolean)
              );
              for (const author of authorsInThread) {
                if (!REVIEW_BOTS.has(author)) continue;
                if (!botThreadStats[author]) {
                  botThreadStats[author] = { total: 0, unresolved: 0 };
                }
                botThreadStats[author].total += 1;
                if (!thread.isResolved) botThreadStats[author].unresolved += 1;
              }
            }

            const impliedBotApprovals = [];
            const botsWithUnresolved = [];
            for (const botLogin of botsWithActivity) {
              if (botsRequestingChanges.has(botLogin)) continue;
              const stats = botThreadStats[botLogin];
              if (stats && stats.unresolved === 0) {
                impliedBotApprovals.push(botLogin);
              } else if (stats) {
                botsWithUnresolved.push(
                  `${botLogin} (${stats.unresolved}/${stats.total} unresolved)`
                );
              } else {
                botsWithUnresolved.push(`${botLogin} (thread status unavailable)`);
              }
            }
            const hasImpliedBotApproval = impliedBotApprovals.length > 0;
            if (hasImpliedBotApproval) {
              core.info(
                `Implied bot approval (no unresolved threads): ` +
                impliedBotApprovals.join(', ')
              );
            }
            if (botsWithUnresolved.length > 0) {
              core.info(
                `Bots with unresolved threads (no implied approval): ` +
                botsWithUnresolved.join('; ')
              );
            }

            // ── 10. Guard: no qualifying review yet ───────────────────────────
            if (!reviewDetected) {
              await setStatus(headSha, 'pending',
                'CI passed. Waiting for a qualifying review.');
              await upsertComment(
                '<!-- auto-merge-pending-review -->',
                `### Auto-merge: pending review\n\n` +
                `All CI checks have passed, but no qualifying review activity has been ` +
                `detected yet.\n\n` +
                `Auto-merge requires **one** of the following:\n` +
                `- an **approved** review,\n` +
                `- an inline review comment from someone other than the PR author plus the \`reviewed\` label, or\n` +
                `- a comment or review from a recognised code-review bot ` +
                `(e.g. \`@gemini-code-assist\`, \`@copilot-pull-request-reviewer\`, \`@coderabbitai\`) ` +
                `with all of its threads resolved — resolution counts as an implicit APPROVAL.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 11. Guard: review exists but no qualifying approval signal ─────
            // Pass conditions (any one is enough):
            //   - explicit APPROVED review, OR
            //   - a bot has implied approval (all its threads resolved), OR
            //   - the `reviewed` label is present (human sign-off on activity).
            const approvalSignal = approvedReviews.length > 0
              || hasImpliedBotApproval
              || hasReviewedLabel;
            if (!approvalSignal) {
              await setStatus(headSha, 'pending',
                'Review received. Resolve bot threads or add `reviewed` label.');
              const parts = [
                approvedReviews.length > 0   ? `${approvedReviews.length} approved review(s): ${approvedNames.join(', ')}` : null,
                nonAuthorComments.length > 0 ? `${nonAuthorComments.length} inline comment(s) by non-author(s)` : null,
                reviewBotActivity > 0        ? `${reviewBotActivity} comment(s)/review(s) from review bot(s): ${botNames.join(', ')}` : null,
              ].filter(Boolean);
              const unresolvedNote = botsWithUnresolved.length > 0
                ? `\nBot threads still unresolved: ${botsWithUnresolved.join('; ')}.\n`
                : '';
              await upsertComment(
                '<!-- auto-merge-needs-label -->',
                `### Auto-merge: review received — action required\n\n` +
                `Review activity detected (${parts.join('; ')}).${unresolvedNote}\n\n` +
                `To proceed, **either**:\n` +
                `- resolve all review-bot threads (counts as an implicit APPROVAL), or\n` +
                `- add the \`reviewed\` label to this PR.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 12. Verify PR is mergeable ─────────────────────────────────────
            let mergeableState = freshPr.mergeable_state;
            for (let attempt = 0; attempt < 3 && mergeableState === 'unknown'; attempt++) {
              core.info(`mergeable_state is 'unknown', retrying in 15s…`);
              await new Promise(r => setTimeout(r, 15_000));
              const { data: rePr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              mergeableState = rePr.mergeable_state;
            }
            // Accept 'unstable' in addition to 'clean'. Our own auto-merge
            // commit status (non-required) may still be 'pending' from a prior
            // polling run, which causes GitHub to report 'unstable' even though
            // all real CI checks, reviews, and label conditions are satisfied.
            // We have already verified each condition above, so merging under
            // 'unstable' is safe. 'dirty', 'behind', 'blocked', 'has_hooks'
            // remain blocking — those indicate real conflicts or unmet protections.
            const mergeOk = mergeableState === 'clean' || mergeableState === 'unstable';
            if (!mergeOk) {
              core.warning(`PR is not mergeable: mergeable_state = '${mergeableState}'`);
              await setStatus(headSha, 'failure',
                `PR not mergeable (state: ${mergeableState}).`);
              await upsertComment(
                '<!-- auto-merge-not-mergeable -->',
                `### Auto-merge: PR not mergeable\n\n` +
                `The PR cannot be merged in its current state (\`mergeable_state: ${mergeableState}\`).\n\n` +
                `Common causes: merge conflicts, outdated branch, or unsatisfied branch-protection rules.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 13. All conditions met — squash merge ──────────────────────────
            core.info(`All conditions met. Squash-merging PR #${prNumber}…`);
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${freshPr.title} (#${prNumber})`,
              });
              await setStatus(headSha, 'success', 'Auto-merged.');
              core.info(`PR #${prNumber} merged successfully.`);
            } catch (err) {
              core.error(`Merge failed: ${err.message}`);
              await setStatus(headSha, 'error', `Merge failed: ${err.message}`);
              await upsertComment(
                '<!-- auto-merge-error -->',
                `### Auto-merge: merge failed\n\n` +
                `All checks passed and the \`reviewed\` label is present, but the ` +
                `automatic squash merge failed:\n\n` +
                `> ${err.message}\n\n` +
                `Please merge manually or investigate the error.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
            }
