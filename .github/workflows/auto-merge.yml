name: Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_review:
    types: [submitted]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    name: Auto-merge on review + passing checks
    runs-on: ubuntu-latest
    # Skip fork PRs (no write-token access).
    # Skip label events that aren't the 'reviewed' label to avoid burning
    # 10+ min of Actions time on every unrelated label addition.
    if: github.event.pull_request.head.repo.full_name == github.repository && (github.event.action != 'labeled' || github.event.label.name == 'reviewed')
    timeout-minutes: 20

    steps:
      - name: Evaluate checks, reviews, and merge
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9
        env:
          CURRENT_RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const currentRunId = process.env.CURRENT_RUN_ID;
            const workflowRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // ── Helper: post or update a marker comment ────────────────────────
            async function upsertComment(marker, body) {
              const fullBody = `${marker}\n${body}`;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber, body: fullBody,
                });
              }
            }

            // ── 1. Verify PR is still open ─────────────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            if (pr.state !== 'open') {
              core.info(`PR #${prNumber} is ${pr.state} — nothing to do.`);
              return;
            }

            const initialSha = pr.head.sha;

            // ── 2. Poll for CI checks to complete (up to 10 min) ──────────────
            // Brief initial delay to let GitHub register new check runs, then
            // poll every 30s rather than sleeping a fixed 10 minutes.
            const MAX_WAIT_MS   = 10 * 60 * 1000;
            const POLL_INTERVAL = 30 * 1000;
            const deadline = Date.now() + MAX_WAIT_MS;

            await new Promise(r => setTimeout(r, 30_000));

            let externalRuns = [];
            let pollComplete = false;

            while (Date.now() < deadline) {
              const checkSuites = await github.paginate(
                github.rest.checks.listSuitesForRef,
                { owner, repo, ref: initialSha },
                response => response.data.check_suites
              );

              let runs = [];
              for (const suite of checkSuites) {
                const suiteRuns = await github.paginate(
                  github.rest.checks.listForSuite,
                  { owner, repo, check_suite_id: suite.id },
                  response => response.data.check_runs
                );
                runs = runs.concat(suiteRuns);
              }

              // Filter out this workflow's own check run by matching the
              // current run ID in the details URL rather than a fragile name
              // string comparison.
              externalRuns = runs.filter(run => {
                const url = run.details_url || run.html_url || '';
                return !url.includes(`/runs/${currentRunId}`);
              });

              const pending = externalRuns.filter(r => r.status !== 'completed');
              core.info(`Checks: ${externalRuns.length} external, ${pending.length} pending`);

              if (pending.length === 0) {
                pollComplete = true;
                break;
              }

              if (Date.now() + POLL_INTERVAL >= deadline) break;
              await new Promise(r => setTimeout(r, POLL_INTERVAL));
            }

            // ── 3. Re-fetch PR and verify SHA hasn't changed during the wait ───
            // A push during the ~10-min window would mean we validated CI for
            // the old commit — abort to avoid merging unreviewed/untested code.
            const { data: freshPr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            if (freshPr.state !== 'open') {
              core.info(`PR #${prNumber} is now ${freshPr.state} — skipping.`);
              return;
            }
            if (freshPr.head.sha !== initialSha) {
              core.info(
                `Head SHA changed during wait ` +
                `(${initialSha.slice(0,7)} → ${freshPr.head.sha.slice(0,7)}) — ` +
                `aborting to avoid merging unreviewed code.`
              );
              return;
            }

            // ── 4. Guard: no CI found ──────────────────────────────────────────
            if (externalRuns.length === 0) {
              core.warning('No external CI check runs found for this PR.');
              await upsertComment(
                '<!-- auto-merge-no-ci -->',
                `### Auto-merge: no CI detected\n\n` +
                `No CI check runs were found for commit \`${initialSha.slice(0,7)}\`.\n` +
                `Auto-merge will not proceed until CI is configured and running.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 5. Guard: checks still pending after polling timeout ───────────
            const stillPending = externalRuns.filter(r => r.status !== 'completed');
            if (!pollComplete || stillPending.length > 0) {
              core.warning(`${stillPending.length} check(s) still pending after timeout.`);
              await upsertComment(
                '<!-- auto-merge-pending -->',
                `### Auto-merge: checks still pending\n\n` +
                `The following checks have not completed after 10 minutes:\n` +
                stillPending.map(r => `- \`${r.name}\``).join('\n') + '\n\n' +
                `Push a new commit or re-apply the \`reviewed\` label to trigger re-evaluation.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 6. Guard: failing checks ───────────────────────────────────────
            const acceptable = new Set(['success', 'skipped', 'neutral']);
            const failing = externalRuns.filter(r => !acceptable.has(r.conclusion));
            if (failing.length > 0) {
              core.warning(`${failing.length} check(s) failing.`);
              await upsertComment(
                '<!-- auto-merge-fail -->',
                `### Auto-merge: checks failing\n\n` +
                `The following checks did not pass:\n` +
                failing.map(r => `- \`${r.name}\` (${r.conclusion})`).join('\n') + '\n\n' +
                `Please fix the failing checks before this PR can be merged.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }
            core.info('All CI checks passed/skipped/neutral.');

            // ── 7. Collect reviews ─────────────────────────────────────────────
            const allReviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: prNumber,
            });
            // Keep the latest state per reviewer
            const latestByReviewer = {};
            for (const review of allReviews) {
              latestByReviewer[review.user.login] = review;
            }
            const reviewList       = Object.values(latestByReviewer);
            const changesRequested = reviewList.filter(r => r.state === 'CHANGES_REQUESTED');
            const reviewerNames    = reviewList.map(r => r.user.login);
            const reviewerStats    = reviewList.length > 0
              ? `${reviewList.length} reviewer(s): ${reviewerNames.join(', ')}`
              : 'no reviewers yet';

            // ── 8. Guard: CHANGES_REQUESTED blocks merge ───────────────────────
            if (changesRequested.length > 0) {
              const blockers = changesRequested.map(r => r.user.login).join(', ');
              core.warning(`Changes requested by: ${blockers}`);
              await upsertComment(
                '<!-- auto-merge-changes-requested -->',
                `### Auto-merge: changes requested\n\n` +
                `The following reviewer(s) have requested changes: **${blockers}**.\n\n` +
                `Auto-merge is blocked until all change requests are resolved or dismissed.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 9. Collect review comments ─────────────────────────────────────
            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number: prNumber,
            });
            const reviewDetected   = allReviews.length > 0 || reviewComments.length > 0;
            const hasReviewedLabel = freshPr.labels.some(l => l.name === 'reviewed');

            core.info(`Review detected: ${reviewDetected} (${reviewerStats})`);
            core.info(`'reviewed' label: ${hasReviewedLabel}`);

            // ── 10. Guard: no review activity yet ─────────────────────────────
            if (!reviewDetected) {
              await upsertComment(
                '<!-- auto-merge-pending-review -->',
                `### Auto-merge: pending review\n\n` +
                `All CI checks have passed, but no code review has been submitted yet.\n\n` +
                `Auto-merge will proceed once a review is submitted **and** the ` +
                `\`reviewed\` label is added to confirm acceptance.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 11. Guard: review exists but 'reviewed' label missing ──────────
            if (!hasReviewedLabel) {
              const parts = [
                allReviews.length > 0  ? `${allReviews.length} review(s) (${reviewerStats})` : null,
                reviewComments.length > 0 ? `${reviewComments.length} inline comment(s)` : null,
              ].filter(Boolean);
              await upsertComment(
                '<!-- auto-merge-needs-label -->',
                `### Auto-merge: review received — action required\n\n` +
                `Review activity detected (${parts.join('; ')}).\n\n` +
                `To confirm you have reviewed and accepted the feedback, please add the ` +
                `\`reviewed\` label to this PR. Auto-merge will then proceed.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 12. Verify PR is mergeable ─────────────────────────────────────
            // GitHub may return 'unknown' while it computes mergeability; retry
            // a few times before giving up.
            let mergeableState = freshPr.mergeable_state;
            for (let attempt = 0; attempt < 3 && mergeableState === 'unknown'; attempt++) {
              core.info(`mergeable_state is 'unknown', retrying in 15s…`);
              await new Promise(r => setTimeout(r, 15_000));
              const { data: rePr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              mergeableState = rePr.mergeable_state;
            }
            if (mergeableState !== 'clean') {
              core.warning(`PR is not mergeable: mergeable_state = '${mergeableState}'`);
              await upsertComment(
                '<!-- auto-merge-not-mergeable -->',
                `### Auto-merge: PR not mergeable\n\n` +
                `The PR cannot be merged in its current state (\`mergeable_state: ${mergeableState}\`).\n\n` +
                `Common causes: merge conflicts, outdated branch, or unsatisfied branch-protection rules.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
              return;
            }

            // ── 13. All conditions met — squash merge ──────────────────────────
            core.info(`All conditions met. Squash-merging PR #${prNumber}…`);
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${freshPr.title} (#${prNumber})`,
              });
              core.info(`PR #${prNumber} merged successfully.`);
            } catch (err) {
              core.error(`Merge failed: ${err.message}`);
              await upsertComment(
                '<!-- auto-merge-error -->',
                `### Auto-merge: merge failed\n\n` +
                `All checks passed and the \`reviewed\` label is present, but the ` +
                `automatic squash merge failed:\n\n` +
                `> ${err.message}\n\n` +
                `Please merge manually or investigate the error.\n\n` +
                `[View workflow run](${workflowRunUrl})`
              );
            }
