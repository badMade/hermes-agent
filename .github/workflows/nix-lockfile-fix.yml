name: Nix Lockfile Fix

on:
  push:
    branches: [main]
    paths:
      - 'ui-tui/package-lock.json'
      - 'ui-tui/package.json'
      - 'web/package-lock.json'
      - 'web/package.json'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix (leave empty to run on the selected branch)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: nix-lockfile-fix-${{ github.event.issue.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  # ── Auto-fix on main ───────────────────────────────────────────────
  # Fires when a push to main touches package.json or package-lock.json
  # in ui-tui/ or web/. Computes the hash updates without write credentials,
  # then a separate privileged job validates and pushes only the Nix patch.
  auto-fix-main-compute:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    concurrency:
      group: auto-fix-main
      cancel-in-progress: true
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main
          persist-credentials: false

      - uses: ./.github/actions/nix-setup
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Apply lockfile hashes
        id: apply
        run: nix run .#fix-lockfiles -- --apply

      - name: Validate and stage patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.apply.outputs.changed }}" != 'true' ]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ensure only Nix hash files were modified before handing a patch to
          # the privileged push job. This job has read-only repository access,
          # so repository-controlled setup/Nix code never sees a push token.
          unexpected="$(git diff --name-only | grep -Ev '^nix/(tui|web)\.nix$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected modified files: $unexpected"
            exit 1
          fi

          git diff -- nix/tui.nix nix/web.nix > nix-lockfile-fix.patch
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Upload lockfile patch
        if: steps.patch.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nix-lockfile-fix-patch
          path: nix-lockfile-fix.patch
          if-no-files-found: error
          retention-days: 1

  auto-fix-main-push:
    if: github.event_name == 'push' && needs.auto-fix-main-compute.outputs.changed == 'true'
    needs: auto-fix-main-compute
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Download lockfile patch
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: nix-lockfile-fix-patch

      - name: Validate patch
        shell: bash
        run: |
          set -euo pipefail

          touched="$(git apply --numstat nix-lockfile-fix.patch | awk 'NF {print $3}')"
          unexpected="$(printf '%s\n' "$touched" | grep -Ev '^nix/(tui|web)\.nix$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Patch touches unexpected files: $unexpected"
            exit 1
          fi

          git apply --check nix-lockfile-fix.patch

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail

          git apply nix-lockfile-fix.patch

          # Ensure only nix files were modified — prevents accidental
          # self-triggering if fix-lockfiles ever touches package files.
          unexpected="$(git diff --name-only | grep -Ev '^nix/(tui|web)\.nix$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected modified files: $unexpected"
            exit 1
          fi

          # Record the base SHA before committing — used to detect package
          # file changes if we need to rebase after a non-fast-forward push.
          BASE_SHA="$(git rev-parse HEAD)"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add nix/tui.nix nix/web.nix
          git commit -m "fix(nix): auto-refresh npm lockfile hashes" \
            -m "Source: $GITHUB_SHA" \
            -m "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          # Retry push with rebase in case main advanced with an unrelated
          # commit during the nix build. Without this, a non-fast-forward
          # rejection silently loses the fix. If package files changed during
          # the rebase, abort — a fresh auto-fix run will handle the new state.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "::warning::Push attempt $attempt failed (non-fast-forward?), rebasing…"
            git fetch origin main

            # If package files changed between our base and the new main,
            # our computed hashes are stale. Abort and let the next triggered
            # run recompute from the correct package-lock state.
            pkg_changed="$(git diff --name-only "$BASE_SHA"..origin/main -- \
              'ui-tui/package-lock.json' 'ui-tui/package.json' \
              'web/package-lock.json' 'web/package.json' || true)"
            if [ -n "$pkg_changed" ]; then
              echo "::warning::Package files changed since hash computation — aborting; a fresh run will recompute"
              exit 0
            fi

            git rebase origin/main
          done
          echo "::error::Failed to push after 3 rebase attempts"
          exit 1

  # ── PR fix (manual / checkbox) ─────────────────────────────────────
  # Existing behavior: run on manual dispatch OR when a task-list
  # checkbox in the sticky lockfile-check comment flips from [ ] to [x].
  fix-compute:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment'
       && github.event.issue.pull_request != null
       && contains(github.event.comment.body, '[x] **Apply lockfile fix**')
       && !contains(github.event.changes.body.from, '[x] **Apply lockfile fix**'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
      owner: ${{ steps.resolve.outputs.owner }}
      repo: ${{ steps.resolve.outputs.repo }}
      ref: ${{ steps.resolve.outputs.ref }}
      pr: ${{ steps.resolve.outputs.pr }}
    steps:
      - name: Authorize & resolve PR
        id: resolve
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71  # v9
        with:
          script: |
            // 1. Verify the actor has write access — applies to both checkbox
            //    clicks and manual dispatch.
            const { data: perm } =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor,
              });
            if (!['admin', 'write', 'maintain'].includes(perm.permission)) {
              core.setFailed(
                `${context.actor} lacks write access (has: ${perm.permission})`
              );
              return;
            }

            // 2. Resolve which ref to check out.
            let prNumber = '';
            if (context.eventName === 'issue_comment') {
              prNumber = String(context.payload.issue.number);
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number || '';
            }

            if (!prNumber) {
              core.setOutput('ref', context.ref.replace(/^refs\/heads\//, ''));
              core.setOutput('repo', context.repo.repo);
              core.setOutput('owner', context.repo.owner);
              core.setOutput('pr', '');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber),
            });
            core.setOutput('ref', pr.head.ref);
            core.setOutput('repo', pr.head.repo.name);
            core.setOutput('owner', pr.head.repo.owner.login);
            core.setOutput('pr', String(pr.number));

      # Wipe the sticky lockfile-check comment to a "running" state as soon
      # as the job is authorized, so the user sees their click was picked up
      # before the ~minute of nix build work.
      - name: Mark sticky as running
        if: steps.resolve.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3
        with:
          header: nix-lockfile-check
          number: ${{ steps.resolve.outputs.pr }}
          message: |
            ### 🔄 Applying lockfile fix…

            Triggered by @${{ github.actor }} — [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Checkout target branch
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          repository: ${{ steps.resolve.outputs.owner }}/${{ steps.resolve.outputs.repo }}
          ref: ${{ steps.resolve.outputs.ref }}
          persist-credentials: false
          fetch-depth: 0

      # Use pinned third-party actions directly here instead of local actions.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: hermes-agent
        continue-on-error: true

      - name: Apply lockfile hashes
        id: apply
        run: nix run .#fix-lockfiles

      - name: Validate and stage patch
        id: patch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.apply.outputs.changed }}" != 'true' ]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          unexpected="$(git diff --name-only | grep -Ev '^nix/(tui|web)\.nix$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected modified files: $unexpected"
            exit 1
          fi

          git diff -- nix/tui.nix nix/web.nix > nix-lockfile-fix.patch
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Upload lockfile patch
        if: steps.patch.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nix-lockfile-fix-pr-patch
          path: nix-lockfile-fix.patch
          if-no-files-found: error
          retention-days: 1

      - name: Update sticky (failed)
        if: failure() && steps.resolve.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3
        with:
          header: nix-lockfile-check
          number: ${{ steps.resolve.outputs.pr }}
          message: |
            ### ❌ Lockfile fix failed

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for logs.

  fix-push:
    if: needs.fix-compute.result == 'success'
    needs: fix-compute
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        if: needs.fix-compute.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout target branch
        if: needs.fix-compute.outputs.changed == 'true'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          repository: ${{ needs.fix-compute.outputs.owner }}/${{ needs.fix-compute.outputs.repo }}
          ref: ${{ needs.fix-compute.outputs.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Download lockfile patch
        if: needs.fix-compute.outputs.changed == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: nix-lockfile-fix-pr-patch

      - name: Validate patch
        if: needs.fix-compute.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          touched="$(git apply --numstat nix-lockfile-fix.patch | awk 'NF {print $3}')"
          unexpected="$(printf '%s\n' "$touched" | grep -Ev '^nix/(tui|web)\.nix$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Patch touches unexpected files: $unexpected"
            exit 1
          fi

          git apply --check nix-lockfile-fix.patch

      - name: Commit & push
        if: needs.fix-compute.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git apply nix-lockfile-fix.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add nix/tui.nix nix/web.nix
          git commit -m "fix(nix): refresh npm lockfile hashes"
          git push

      - name: Update sticky (applied)
        if: needs.fix-compute.outputs.changed == 'true' && needs.fix-compute.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3
        with:
          header: nix-lockfile-check
          number: ${{ needs.fix-compute.outputs.pr }}
          message: |
            ### ✅ Lockfile fix applied

            Pushed a commit refreshing the npm lockfile hashes — [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Update sticky (failed)
        if: failure() && needs.fix-compute.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3
        with:
          header: nix-lockfile-check
          number: ${{ needs.fix-compute.outputs.pr }}
          message: |
            ### ❌ Lockfile fix failed

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for logs.

      - name: Update sticky (already current)
        if: needs.fix-compute.outputs.changed == 'false' && needs.fix-compute.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0  # v3
        with:
          header: nix-lockfile-check
          number: ${{ needs.fix-compute.outputs.pr }}
          message: |
            ### ✅ Lockfile hashes already current

            Nothing to commit — [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
